<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Tunmbi Okediran — ML Engineer · Quant Research · AI Governance</title>
  <meta name="description" content="Portfolio of production-style ML projects at the intersection of quantitative finance, NLP engineering, and model risk governance." />
  <meta name="author" content="Tunmbi Okediran" />
  <link rel="canonical" href="https://okedirantunmbi.github.io/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://okedirantunmbi.github.io/" />
  <meta property="og:title"       content="Tunmbi Okediran — ML Engineer · Quant Research · AI Governance" />
  <meta property="og:description" content="Portfolio of production-style ML projects at the intersection of quantitative finance, NLP engineering, and model risk governance." />
  <meta property="og:image"       content="https://okedirantunmbi.github.io/assets/img/og-card.svg" />
  <meta property="og:image:width"  content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Tunmbi Okediran — ML Engineer · Quant Research · AI Governance" />
  <meta name="twitter:description" content="Portfolio of production-style ML projects at the intersection of quantitative finance, NLP engineering, and model risk governance." />
  <meta name="twitter:image"       content="https://okedirantunmbi.github.io/assets/img/og-card.svg" />

  <!-- Theme / Favicon -->
  <meta name="theme-color" content="#C0552A" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <!-- Preconnect for Google Fonts (loaded in CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>

  <!-- ══ Navigation ════════════════════════════════════════ -->
  <header id="navbar" role="banner">
    <nav class="container nav-inner" aria-label="Main navigation">
      <a href="#hero" class="nav-logo" id="nav-logo" aria-label="Back to top">T.O.</a>
      <ul class="nav-links" id="nav-links" role="list"></ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <main>

    <!-- ══ Hero ══════════════════════════════════════════════ -->
    <section id="hero" aria-labelledby="hero-name">
      <div class="container hero-inner">
        <div class="hero-text">
          <p class="hero-greeting" id="hero-greeting"></p>
          <h1 class="hero-name serif" id="hero-name"></h1>
          <div class="hero-roles" id="hero-roles" aria-label="Roles"></div>
          <p class="hero-tagline" id="hero-tagline"></p>
          <div class="hero-ctas" id="hero-ctas"></div>
        </div>
        <div class="hero-photo-wrap">
          <div class="hero-photo-frame">
            <img id="hero-photo" src="" alt="" loading="eager" fetchpriority="high" />
          </div>
        </div>
      </div>
    </section>

    <!-- ══ About ══════════════════════════════════════════════ -->
    <section id="about" aria-labelledby="about-heading">
      <div class="container">
        <span class="section-label">Background</span>
        <h2 class="section-heading serif" id="about-heading"></h2>
        <hr class="rule" />
        <div class="about-grid">
          <div class="about-bio reveal" id="about-bio"></div>
          <div class="about-stats" id="about-stats"></div>
        </div>
        <div class="about-cv reveal" id="about-cv"></div>
      </div>
    </section>

    <!-- ══ Projects ═══════════════════════════════════════════ -->
    <section id="projects" aria-labelledby="projects-heading">
      <div class="container">
        <span class="section-label">Work</span>
        <h2 class="section-heading serif" id="projects-heading"></h2>
        <p class="section-sub" id="projects-sub"></p>
        <hr class="rule" />
        <div class="projects-grid" id="projects-grid"></div>
      </div>
    </section>

    <!-- ══ Results ════════════════════════════════════════════ -->
    <section id="results" aria-labelledby="results-heading">
      <div class="container">
        <span class="section-label">Numbers</span>
        <h2 class="section-heading serif" id="results-heading"></h2>
        <p class="section-sub" id="results-sub"></p>
        <hr class="rule" />
        <div class="results-tables" id="results-tables"></div>
      </div>
    </section>

    <!-- ══ Philosophy ═════════════════════════════════════════ -->
    <section id="philosophy" aria-labelledby="philosophy-heading">
      <div class="container">
        <span class="section-label">Principles</span>
        <h2 class="section-heading serif" id="philosophy-heading"></h2>
        <p class="section-sub" id="philosophy-sub"></p>
        <hr class="rule" />
        <div class="philosophy-grid" id="philosophy-grid"></div>
      </div>
    </section>

    <!-- ══ Stack ══════════════════════════════════════════════ -->
    <section id="stack" aria-labelledby="stack-heading">
      <div class="container">
        <span class="section-label">Tools</span>
        <h2 class="section-heading serif" id="stack-heading"></h2>
        <hr class="rule" />
        <div class="stack-grid" id="stack-grid"></div>
      </div>
    </section>

    <!-- ══ Contact ════════════════════════════════════════════ -->
    <section id="contact" aria-labelledby="contact-heading">
      <div class="container contact-inner">
        <span class="section-label">Connect</span>
        <h2 class="section-heading serif" id="contact-heading"></h2>
        <p class="section-sub" id="contact-sub"></p>
        <hr class="rule" style="margin-inline:auto" />
        <div class="contact-links" id="contact-links"></div>
        <p class="contact-note" id="contact-note"></p>
      </div>
    </section>

  </main>

  <!-- ══ Footer ════════════════════════════════════════════ -->
  <footer role="contentinfo">
    <div class="container footer-inner">
      <span class="footer-name serif" id="footer-name"></span>
      <span class="footer-note mono" id="footer-note"></span>
      <span class="footer-note" id="footer-year"></span>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="assets/js/content.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>
