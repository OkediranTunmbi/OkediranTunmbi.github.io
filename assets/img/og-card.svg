<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F7F2E8"/>
  <!-- Left accent bar -->
  <rect width="8" height="630" fill="#C0552A"/>
  <!-- Bottom stripe -->
  <rect y="560" width="1200" height="70" fill="#1B4E6B"/>
  <!-- Subtle radial -->
  <radialGradient id="glow" cx="75%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#C0552A" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#C0552A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Name -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="72" font-weight="700"
        fill="#1C1C1E">Tunmbi Okediran</text>

  <!-- Divider -->
  <rect x="80" y="230" width="60" height="4" rx="2" fill="#C0552A"/>

  <!-- Roles -->
  <text x="80" y="300" font-family="Arial, sans-serif" font-size="30" fill="#4A4540">
    ML Engineer · Quant Research · AI Governance
  </text>

  <!-- Tagline -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="22" fill="#7A7268">
    Production-style ML at the intersection of finance and governance.
  </text>

  <!-- Bottom bar text -->
  <text x="80" y="605" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.75)">
    okedirantunmbi.github.io/ml-quant-governance-portfolio
  </text>

  <!-- Right accent mark -->
  <text x="1100" y="460" font-family="Georgia, serif" font-size="200" font-weight="700"
        fill="#C0552A" opacity="0.06">T</text>
</svg>
